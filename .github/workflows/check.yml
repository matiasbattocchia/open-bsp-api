name: Check

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno fmt --check
      - run: deno lint
      - run: cd supabase/functions && deno check .
      - run: cd plugin && deno check .
